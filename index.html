<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Digital Imersiva - BV Planos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Safe area para TVs que cortam as bordas */
            --safe-margin: 3%; 
            --gold-bright: #FFD700;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: var(--font-body); 
            width: 100vw; height: 100vh;
        }
        
        #tv-wrapper {
            position: absolute; top: 50%; left: 50%; 
            display: flex; flex-direction: column;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%) rotate(0deg);
            overflow: hidden;
        }

        #tv-wrapper.vertical {
            width: 100vh; height: 100vw; 
        }

        /* ========================================== */
        /* ÁREA CENTRAL DO PDF (O FOCO É AQUI)        */
        /* ========================================== */
        main { 
            flex-grow: 1; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; /* Fica no fundo */
        }

        #pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            /* Garante que o PDF ocupe tudo e não crie bordas */
            display: block; 
        }

        /* ========================================== */
        /* OVERLAYS (CABEÇALHO E RODAPÉ FLUTUANTES)  */
        /* ========================================== */
        header, footer {
            position: absolute;
            left: 0; width: 100%;
            z-index: 20; /* Fica por cima do PDF */
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; /* Não atrapalha cliques se o PDF tiver links */
        }

        header { 
            top: 0; 
            padding: 1.5rem calc(2.5rem + var(--safe-margin)); 
            /* Degradê suave que clareia o PDF para leitura no topo */
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
        }
        
        footer { 
            bottom: 0; 
            padding: 1rem calc(2.5rem + var(--safe-margin)) 1.5rem calc(2.5rem + var(--safe-margin)); 
            /* Degradê que escurece o rodapé para leitura */
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
        }
        
        /* Tipografia de Destaque */
        .text-overlay-white {
            color: white !important;
            text-shadow: 2px 2px 8px rgba(0,0,0,1); /* Sombra para ler em QUALQUER fundo */
        }
        
        /* Títulos do Header */
        header h1 {
            font-size: 2.8rem; font-weight: 800; line-height: 1; letter-spacing: 2px;
        }
        header p {
            font-size: 1.4rem; font-weight: 300; text-transform: uppercase; letter-spacing: 4px;
        }
        
        /* Relógio Premium */
        #relogio-tv {
            font-size: 3.2rem; font-weight: 300; font-variant-numeric: tabular-nums;
        }

        /* Informações do Footer */
        .phone-number {
            font-size: 3rem; font-weight: 800; line-height: 1;
        }
        .plantao-text {
            font-size: 1.1rem; font-weight: 600; text-transform: uppercase; color: var(--gold-bright); letter-spacing: 1px;
        }
        .location-name {
            font-size: 1.8rem; font-weight: 600;
        }
        .location-address {
            font-size: 1.2rem; font-weight: 300; color: #ccc;
        }

        /* ========================================== */
        /* CONTROLES TÉCNICOS                         */
        /* ========================================== */
        #painel-controles { 
            position: fixed; bottom: 30px; right: 30px; z-index: 9999; 
            opacity: 0; transition: opacity 0.4s ease; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); border: 1px solid #333;
            pointer-events: auto; /* Permite cliques neste painel */
        }
        #painel-controles:hover { opacity: 1; }
        
    </style>
</head>
<body>

    <div id="painel-controles" class="p-3 rounded-pill shadow d-flex gap-3">
        <button class="btn btn-outline-light rounded-circle p-3" onclick="girar(-90)" title="Girar para a Esquerda"><i class="bi bi-arrow-counterclockwise fs-3"></i></button>
        <button class="btn btn-outline-light rounded-circle p-3" onclick="girar(90)" title="Girar para a Direita"><i class="bi bi-arrow-clockwise fs-3"></i></button>
        <button class="btn btn-outline-warning rounded-circle p-3" onclick="telaCheia()" title="Tela Cheia"><i class="bi bi-arrows-fullscreen fs-3"></i></button>
    </div>

    <div id="tv-wrapper">
        
        <header>
            <div class="d-flex align-items-center">
                <img src="logo.png" alt="BV Planos" class="me-4" style="height: 4.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
                <div>
                    <h1 class="m-0 text-overlay-white">BV PLANOS</h1>
                    <p class="m-0 text-overlay-white">Assistência Funeral</p>
                </div>
            </div>
            <div class="d-flex align-items-center">
                <i class="bi bi-clock text-overlay-white me-3 fs-2"></i>
                <span id="relogio-tv" class="text-overlay-white">00:00</span>
            </div>
        </header>

        <main>
            <iframe id="pdf-viewer" src="apresentacao.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" title="Apresentação BV Planos"></iframe>
        </main>

        <footer>
            <div class="d-flex align-items-center">
                <i class="bi bi-whatsapp text-overlay-white me-4" style="font-size: 3.5rem;"></i>
                <div>
                    <div class="plantao-text">Plantão 24 Horas</div>
                    <div class="phone-number text-overlay-white">
                        (84) 98630-8443
                    </div>
                </div>
            </div>
            <div class="text-end">
                <div class="d-flex align-items-center justify-content-end mb-1">
                    <i class="bi bi-geo-alt-fill text-overlay-white me-2 fs-4"></i>
                    <span class="location-name text-overlay-white">Memorial São Pedro</span>
                </div>
                <div class="location-address">Rua Francisco Bittencourt, 211 - Vila Nova</div>
            </div>
        </footer>
    </div>

    <script>
        // 1. Relógio Otimizado e Elegante
        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const min = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio-tv').textContent = `${horas}:${min}`;
        }
        setInterval(atualizarRelogio, 1000); 
        atualizarRelogio();

        // 2. Lógica de Rotação (Mantida intacta e robusta)
        let anguloAtual = parseInt(localStorage.getItem('tvAnguloPremiumPDF')) || 0;
        const wrapper = document.getElementById('tv-wrapper');

        function aplicarRotacao() {
            let anguloNormalizado = ((anguloAtual % 360) + 360) % 360;
            // Se estiver em 90 ou 270, a TV está de pé (vertical)
            if (anguloNormalizado === 90 || anguloNormalizado === 270) {
                wrapper.classList.add('vertical');
            } else {
                wrapper.classList.remove('vertical');
            }
            wrapper.style.transform = `translate(-50%, -50%) rotate(${anguloAtual}deg)`;
            localStorage.setItem('tvAnguloPremiumPDF', anguloAtual);
        }
        function girar(graus) { 
            anguloAtual += graus; 
            aplicarRotacao(); 
        }
        aplicarRotacao(); // Aplica a rotação salva na primeira carga

        // 3. Tela Cheia (Funcionalidade)
        function telaCheia() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        // 4. Atualização da página a cada hora (limpa a RAM da TV, opcional mas recomendado)
        // setTimeout(() => window.location.reload(), 3600000);
    </script>
</body>
</html>
