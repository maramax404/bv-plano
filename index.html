<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Digital Premium - BV Plano</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Margem de segurança para a TV */
            --safe-margin: 3%; 
            
            /* Paleta de Cores Premium */
            --verde-escuro: #0a2911; /* Verde bem profundo e elegante */
            --verde-bv: #1B5E20;     /* Verde original para detalhes */
            --dourado: #D4AF37;
            
            --font-title: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: var(--font-body); 
        }
        
        /* O TV-Wrapper organiza os blocos: Header (topo), Main (meio), Footer (baixo) */
        #tv-wrapper {
            position: absolute; top: 50%; left: 50%; background-color: #000;
            display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%) rotate(0deg);
        }

        #tv-wrapper.vertical {
            width: 100vh; height: 100vw; 
        }

        /* ========================================== */
        /* CABEÇALHO (BLOCO SÓLIDO BRANCO)            */
        /* ========================================== */
        header { 
            background-color: #ffffff; 
            padding: 2rem calc(2rem + var(--safe-margin)); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 6px solid var(--dourado); /* Linha dourada separando do vídeo */
            z-index: 10; 
            flex-shrink: 0; /* Impede que o cabeçalho seja esmagado */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .header-title { color: var(--verde-escuro); font-family: var(--font-title); font-size: 3.8rem; font-weight: 900; line-height: 1; }
        .header-subtitle { color: #666; font-size: 1.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; }

        .relogio-box {
            background-color: #f4f4f4;
            border: 2px solid #e0e0e0;
        }

        /* ========================================== */
        /* CENTRO: ÁREA EXCLUSIVA DO VÍDEO            */
        /* ========================================== */
        main { 
            flex-grow: 1; /* Ocupa todo o espaço restante entre cabeçalho e rodapé */
            position: relative; 
            overflow: hidden; 
            background-color: #000; /* Fundo preto caso o vídeo tenha proporção diferente */
        }

        #video-centro {
            width: 100%; 
            height: 100%;
            object-fit: cover; /* Faz o vídeo preencher o quadrado perfeitamente sem bordas pretas */
            display: block;
        }

        /* ========================================== */
        /* RODAPÉ (BLOCO SÓLIDO VERDE ESCURO)         */
        /* ========================================== */
        footer { 
            background-color: var(--verde-escuro); 
            padding: 2rem calc(2rem + var(--safe-margin)); 
            display: flex; justify-content: space-between; align-items: center; 
            border-top: 4px solid var(--verde-bv);
            z-index: 10; 
            flex-shrink: 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        
        .footer-plantao { font-size: 1.4rem; text-transform: uppercase; color: var(--dourado); font-weight: 700; letter-spacing: 2px; }
        .footer-telefone { font-size: 3.6rem; font-weight: 800; line-height: 1; color: white; }
        
        .footer-local { font-size: 2.2rem; font-weight: 700; color: white; }
        .footer-end { font-size: 1.4rem; color: #a5d6a7; font-weight: 400; }

        /* ========================================== */
        /* CONTROLES TÉCNICOS OCULTOS                 */
        /* ========================================== */
        #painel-controles { 
            position: fixed; bottom: 30px; right: 30px; z-index: 9999; 
            opacity: 0.1; transition: opacity 0.3s; 
            background: rgba(0,0,0,0.8);
        }
        #painel-controles:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="painel-controles" class="p-2 rounded shadow d-flex gap-2">
        <button class="btn btn-warning fw-bold" onclick="girar(-90)" title="Girar para a Esquerda"><i class="bi bi-arrow-counterclockwise fs-4"></i></button>
        <button class="btn btn-warning fw-bold" onclick="girar(90)" title="Girar para a Direita"><i class="bi bi-arrow-clockwise fs-4"></i></button>
        <button class="btn btn-primary fw-bold" onclick="telaCheia()" title="Tela Cheia"><i class="bi bi-arrows-fullscreen fs-4"></i></button>
    </div>

    <div id="tv-wrapper">
        
        <header>
            <div class="d-flex align-items-center">
                <img src="logo.png" alt="Logo" class="me-4" style="height: 5rem;">
                <div>
                    <h1 class="m-0 header-title">BV PLANOS</h1>
                    <p class="m-0 header-subtitle">Assistência Funeral</p>
                </div>
            </div>
            <div class="d-flex align-items-center relogio-box px-4 py-2 rounded-pill shadow-sm">
                <i class="bi bi-clock-fill text-dark me-3" style="font-size: 2.5rem;"></i>
                <span id="relogio-tv" class="fw-bold text-dark" style="font-size: 3.2rem; font-variant-numeric: tabular-nums;">00:00</span>
            </div>
        </header>

        <main>
            <video id="video-centro" src="video.mp4" autoplay loop muted playsinline></video>
        </main>

        <footer>
            <div class="d-flex align-items-center">
                <i class="bi bi-whatsapp text-success me-4" style="font-size: 4.5rem;"></i>
                <div>
                    <div class="footer-plantao">Plantão 24 Horas</div>
                    <div class="footer-telefone">(84) 98630-8443</div>
                </div>
            </div>
            <div class="text-end">
                <div class="d-flex align-items-center justify-content-end mb-1">
                    <i class="bi bi-geo-alt-fill text-warning me-3" style="font-size: 2.5rem;"></i>
                    <span class="footer-local">Memorial São Pedro</span>
                </div>
                <div class="footer-end">Rua Francisco Bittencourt, 211 - Vila Nova</div>
            </div>
        </footer>
    </div>

    <script>
        // 1. Relógio
        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const min = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio-tv').innerText = `${horas}:${min}`;
        }
        setInterval(atualizarRelogio, 1000); 
        atualizarRelogio();

        // 2. Rotação do Monitor
        let anguloAtual = parseInt(localStorage.getItem('tvAnguloFinal')) || 0;
        const wrapper = document.getElementById('tv-wrapper');

        function aplicarRotacao() {
            let anguloNormalizado = ((anguloAtual % 360) + 360) % 360;
            if (anguloNormalizado === 90 || anguloNormalizado === 270) {
                wrapper.classList.add('vertical');
            } else {
                wrapper.classList.remove('vertical');
            }
            wrapper.style.transform = `translate(-50%, -50%) rotate(${anguloAtual}deg)`;
            localStorage.setItem('tvAnguloFinal', anguloAtual);
        }
        function girar(graus) { 
            anguloAtual += graus; 
            aplicarRotacao(); 
        }
        aplicarRotacao();

        // 3. Tela Cheia
        function telaCheia() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
