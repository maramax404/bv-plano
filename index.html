<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BV Planos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #e0f2f1; /* Fundo fixo para não travar a TV */
            color: #1a1a1a;
        }

        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: #1a1a1a; z-index: 9999; color: white;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h2 id="status-text">Carregando sistema...</h2>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Ícones
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconPhone = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconMaximize = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // Estados do PDF e Transição
            const [pdfDoc, setPdfDoc] = useState(null);
            const [currentPage, setCurrentPage] = useState(1);
            const [totalPages, setTotalPages] = useState(0);
            const [isFading, setIsFading] = useState(false); // Controle da transição
            const pdfCanvasRef = useRef(null);

            // === NOME DO SEU ARQUIVO PDF AQUI ===
            const pdfUrl = 'apresentacao.pdf'; 

            // Relógio e Loading
            useEffect(() => {
                const loading = document.getElementById('loading-screen');
                if(loading) loading.style.display = 'none';

                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Wake Lock (Evitar que a TV apague)
            useEffect(() => {
                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator) {
                            let wakeLock = await navigator.wakeLock.request('screen');
                            wakeLock.addEventListener('release', () => requestWakeLock());
                        }
                    } catch (err) { console.log('Erro WakeLock:', err); }
                };
                requestWakeLock();
                const handleInteraction = () => requestWakeLock();
                document.addEventListener('visibilitychange', handleInteraction);
                window.addEventListener('click', handleInteraction);
                return () => {
                    document.removeEventListener('visibilitychange', handleInteraction);
                    window.removeEventListener('click', handleInteraction);
                };
            }, []);

            // Carregar o PDF inicialmente
            useEffect(() => {
                const loadPdf = async () => {
                    try {
                        const loadingTask = pdfjsLib.getDocument(pdfUrl);
                        const pdf = await loadingTask.promise;
                        setPdfDoc(pdf);
                        setTotalPages(pdf.numPages);
                    } catch (error) {
                        console.error('Erro ao carregar o PDF:', error);
                    }
                };
                loadPdf();
            }, []);

            // Lógica do Slide com Transição
            useEffect(() => {
                if (!pdfDoc || totalPages === 0) return;
                
                const slideTimer = setInterval(() => {
                    // 1. Inicia o Fade Out (apaga a imagem)
                    setIsFading(true);
                    
                    // 2. Espera 500ms (tempo do fade) e muda a página
                    setTimeout(() => {
                        setCurrentPage((prev) => (prev >= totalPages ? 1 : prev + 1));
                    }, 500);

                }, 15000); // <-- 15 Segundos por slide
                
                return () => clearInterval(slideTimer);
            }, [pdfDoc, totalPages]);

            // Renderizar a página no Canvas e fazer o Fade In
            useEffect(() => {
                if (!pdfDoc || !pdfCanvasRef.current) return;

                const renderPage = async () => {
                    const page = await pdfDoc.getPage(currentPage);
                    const canvas = pdfCanvasRef.current;
                    const ctx = canvas.getContext('2d');

                    // Qualidade de imagem para a TV
                    const viewport = page.getViewport({ scale: 2.0 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const renderContext = { canvasContext: ctx, viewport: viewport };
                    await page.render(renderContext).promise;
                    
                    // 3. Após renderizar, retira o fade (acende a imagem)
                    setIsFading(false);
                };

                renderPage();
            }, [pdfDoc, currentPage]);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const timeString = currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            return (
                <div className="flex flex-col h-screen w-screen bg-emerald-50 p-6 gap-6 box-border">
                    
                    {/* CABEÇALHO */}
                    <header className="flex justify-between items-center bg-white rounded-2xl shadow-md p-6 border border-emerald-100 shrink-0">
                        <div className="flex items-center gap-6">
                            <img src="logo.png" alt="Logo" className="w-24 h-24 object-contain" onError={(e) => e.target.style.display = 'none'} />
                            <div>
                                <h1 className="text-5xl font-bold text-emerald-800 tracking-tight">Baixa Verde</h1>
                                <p className="text-2xl text-emerald-600 font-medium uppercase tracking-widest mt-1">Assistência Familiar</p>
                            </div>
                        </div>
                        
                        <div className="flex flex-col items-end gap-2">
                            <div className="flex items-center gap-3 bg-emerald-50 px-6 py-3 rounded-xl">
                                <IconClock />
                                <span className="text-6xl font-black text-slate-800 tracking-tighter">{timeString}</span>
                            </div>
                        </div>
                    </header>

                    {/* ÁREA CENTRAL - SLIDE (PDF) */}
                    <main className="flex-1 relative bg-white rounded-2xl shadow-inner border border-emerald-200 overflow-hidden flex items-center justify-center p-4">
                        {!pdfDoc ? (
                            <div className="text-3xl text-gray-400 font-medium">Carregando Apresentação...</div>
                        ) : (
                            <canvas 
                                ref={pdfCanvasRef} 
                                className={`max-w-full max-h-full object-contain transition-opacity duration-500 ease-in-out ${isFading ? 'opacity-0' : 'opacity-100'}`}
                            />
                        )}
                    </main>

                    {/* RODAPÉ - CONTATOS */}
                    <footer className="flex justify-between items-center bg-emerald-800 text-white rounded-2xl shadow-lg p-6 shrink-0">
                        <div className="flex items-center gap-8">
                            
                            <div className="flex items-center gap-3">
                                <IconPhone />
                                <div>
                                    <p className="text-sm text-emerald-200 uppercase tracking-wider font-bold">Plantão 24h / WhatsApp</p>
                                    <p className="text-3xl font-bold">(00) 00000-0000</p>
                                </div>
                            </div>

                            <div className="w-px h-12 bg-emerald-600"></div> <div className="flex items-center gap-3">
                                <IconMapPin />
                                <div>
                                    <p className="text-sm text-emerald-200 uppercase tracking-wider font-bold">Endereço</p>
                                    <p className="text-2xl font-medium">Sua Rua Aqui, Número - Bairro</p>
                                </div>
                            </div>

                        </div>

                        <div className="flex items-center gap-4">
                            <span className="text-emerald-200 text-lg">
                                {totalPages > 0 ? `Slide ${currentPage} de ${totalPages}` : ''}
                            </span>
                            <button onClick={toggleFullScreen} className="p-4 bg-emerald-700 hover:bg-emerald-600 rounded-xl transition-colors shadow-sm" title="Tela Cheia">
                                <IconMaximize />
                            </button>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
