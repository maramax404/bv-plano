<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BV Plano</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configura o worker do PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #e0f2f1; /* Fundo estático super leve */
            color: #1a1a1a;
        }

        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: #1a1a1a; z-index: 9999; color: white;
        }

        /* Animações Simples de Entrada */
        @keyframes fade-in-down { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes slide-up { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in-down { animation: fade-in-down 0.8s ease-out forwards; }
        .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h2 id="status-text">Carregando sistema...</h2>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Ícones
        const IconClock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconCalendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconMaximize = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [rotationAngle, setRotationAngle] = useState(0);
            
            // Estados do PDF
            const [pdfDoc, setPdfDoc] = useState(null);
            const [currentPage, setCurrentPage] = useState(1);
            const [totalPages, setTotalPages] = useState(0);
            const pdfCanvasRef = useRef(null);

            // NOME DO SEU ARQUIVO PDF AQUI
            const pdfUrl = 'apresentacao.pdf'; 

            // Remove a tela de carregamento e inicia o relógio
            useEffect(() => {
                const loading = document.getElementById('loading-screen');
                if(loading) loading.style.display = 'none';

                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Wake Lock (Para manter a tela da TV ligada)
            useEffect(() => {
                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator) {
                            let wakeLock = await navigator.wakeLock.request('screen');
                            console.log('Bloqueio de tela ativado!');
                            wakeLock.addEventListener('release', () => {
                                console.log('Soltou bloqueio, reconectando...');
                                requestWakeLock();
                            });
                        }
                    } catch (err) { console.log('Erro WakeLock:', err); }
                };

                requestWakeLock();
                const handleInteraction = () => requestWakeLock();
                document.addEventListener('visibilitychange', handleInteraction);
                window.addEventListener('click', handleInteraction);
                window.addEventListener('touchstart', handleInteraction);

                return () => {
                    document.removeEventListener('visibilitychange', handleInteraction);
                    window.removeEventListener('click', handleInteraction);
                    window.removeEventListener('touchstart', handleInteraction);
                };
            }, []);

            // Carregar o PDF
            useEffect(() => {
                const loadPdf = async () => {
                    try {
                        const loadingTask = pdfjsLib.getDocument(pdfUrl);
                        const pdf = await loadingTask.promise;
                        setPdfDoc(pdf);
                        setTotalPages(pdf.numPages);
                    } catch (error) {
                        console.error('Erro ao carregar o PDF:', error);
                    }
                };
                loadPdf();
            }, []);

            // Loop das páginas do PDF (Passa o slide a cada 15 segundos)
            useEffect(() => {
                if (!pdfDoc || totalPages === 0) return;
                
                const slideTimer = setInterval(() => {
                    setCurrentPage((prev) => (prev >= totalPages ? 1 : prev + 1));
                }, 15000); // <-- Altere aqui o tempo de cada slide (15000 = 15 segundos)
                
                return () => clearInterval(slideTimer);
            }, [pdfDoc, totalPages]);

            // Renderizar a página atual do PDF no Canvas
            useEffect(() => {
                if (!pdfDoc || !pdfCanvasRef.current) return;

                const renderPage = async () => {
                    const page = await pdfDoc.getPage(currentPage);
                    const canvas = pdfCanvasRef.current;
                    const ctx = canvas.getContext('2d');

                    // Ajusta a escala para ficar com boa qualidade na tela
                    const viewport = page.getViewport({ scale: 1.5 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                };

                renderPage();
            }, [pdfDoc, currentPage]);

            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const getRotationStyle = () => {
                return {
                    transform: `rotate(${rotationAngle}deg)`,
                    transformOrigin: 'center center',
                    width: Math.abs(rotationAngle) === 90 || Math.abs(rotationAngle) === 270 ? '100vh' : '100vw',
                    height: Math.abs(rotationAngle) === 90 || Math.abs(rotationAngle) === 270 ? '100vw' : '100vh',
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    marginTop: Math.abs(rotationAngle) === 90 || Math.abs(rotationAngle) === 270 ? '-50vw' : '-50vh',
                    marginLeft: Math.abs(rotationAngle) === 90 || Math.abs(rotationAngle) === 270 ? '-50vh' : '-50vw',
                };
            };

            const timeString = currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const dateString = currentTime.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

            return (
                <div className="relative w-full h-[100dvh] overflow-hidden font-sans text-gray-900 transition-all duration-500">
                    <div className="w-full h-full relative" style={getRotationStyle()}>
                        
                        <div className="relative z-10 flex flex-col justify-between h-full p-4 max-w-full mx-auto gap-2">
                            
                            {/* CABEÇALHO */}
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 md:p-8 bg-white/70 backdrop-blur-md rounded-2xl md:rounded-3xl shadow-lg border border-white/40 animate-fade-in-down">
                                <div className="relative mb-4 sm:mb-0 w-full sm:w-auto text-center sm:text-left">
                                    <h1 className="text-2xl xs:text-3xl md:text-5xl lg:text-7xl font-bold tracking-tight text-emerald-800 drop-shadow-sm flex flex-col items-center sm:items-start gap-2">
                                        <span className="bg-clip-text text-transparent bg-gradient-to-r from-emerald-700 to-teal-900">
                                            Assistência Funeral
                                        </span>
                                        
                                        {/* Logo Absoluto */}
                                        <div className="absolute top-full left-0 mt-2 z-50">
                                            <img 
                                                src="logo.png" 
                                                alt="Logo" 
                                                className="w-24 h-24 md:w-32 md:h-32 object-contain bg-white rounded-xl shadow-md p-1 border border-emerald-100 hidden sm:block"
                                                onError={(e) => e.target.style.display = 'none'}
                                            />
                                        </div>
                                    </h1>
                                    <p className="text-sm md:text-xl lg:text-2xl text-emerald-600/80 font-medium uppercase tracking-widest mt-1 md:mt-2">
                                        Painel Informativo
                                    </p>
                                </div>

                                <div className="flex flex-col items-center sm:items-end gap-2 md:gap-4 w-full sm:w-auto">
                                    <div className="flex items-center gap-2 md:gap-4 bg-white/80 px-4 md:px-8 py-2 md:py-4 rounded-xl md:rounded-2xl shadow-sm border border-emerald-50">
                                        <IconClock className="w-6 h-6 md:w-10 md:h-10 text-emerald-600 animate-pulse" />
                                        <span className="text-3xl md:text-5xl lg:text-6xl font-black text-slate-800 tracking-tighter tabular-nums">
                                            {timeString}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-2 px-2 text-emerald-700 font-medium text-sm md:text-lg lg:text-xl capitalize">
                                        <IconCalendar className="w-4 h-4 md:w-5 md:h-5 opacity-70" />
                                        {dateString}
                                    </div>
                                </div>
                            </div>

                            {/* CONTAINER DO PDF (SUBSTITUIU AS IMAGENS) */}
                            <div className="flex-1 w-full flex items-center justify-center p-2 animate-slide-up relative z-0 mt-8 sm:mt-0">
                                <div className="relative w-full aspect-video md:aspect-[21/9] max-h-[60vh] md:max-h-[70vh] rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl bg-white border border-gray-200 flex items-center justify-center">
                                    
                                    {!pdfDoc ? (
                                        <div className="text-gray-400 font-medium">Carregando PDF...</div>
                                    ) : (
                                        <canvas 
                                            ref={pdfCanvasRef} 
                                            className="max-w-full max-h-full object-contain"
                                        />
                                    )}

                                </div>
                            </div>

                            {/* RODAPÉ E CONTROLES */}
                            <div className="flex justify-between items-center p-4 bg-white/70 backdrop-blur-md rounded-xl md:rounded-2xl shadow-lg border border-white/40 animate-fade-in-up mt-auto z-50">
                                
                                <div className="text-emerald-800 font-medium text-xs md:text-sm">
                                    {totalPages > 0 ? `Página ${currentPage} de ${totalPages}` : 'Preparando slide...'}
                                </div>
                                
                                <div className="flex gap-2">
                                    <button onClick={toggleFullScreen} className="p-2 md:p-3 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-lg md:rounded-xl transition-colors shadow-sm active:scale-95 flex items-center gap-2" title="Tela Cheia">
                                        <IconMaximize className="w-4 h-4 md:w-5 md:h-5" />
                                        <span className="hidden sm:inline font-medium text-sm">Tela Cheia</span>
                                    </button>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
