<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Digital em Vídeo - BV Planos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Margem de segurança para TVs que comem as bordas da imagem */
            --safe-margin: 3%; 
            --gold-premium: #D4AF37;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: var(--font-body); 
            width: 100vw; height: 100vh;
        }
        
        #tv-wrapper {
            position: absolute; top: 50%; left: 50%; 
            display: flex; flex-direction: column;
            justify-content: space-between; /* Mantém o header no topo e footer embaixo */
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%) rotate(0deg);
            overflow: hidden;
        }

        #tv-wrapper.vertical {
            width: 100vh; height: 100vw; 
        }

        /* ========================================== */
        /* VÍDEO DE FUNDO EM LOOP                     */
        /* ========================================== */
        #video-fundo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Faz o vídeo preencher toda a tela sem esticar */
            z-index: -2;
        }

        /* ========================================== */
        /* CABEÇALHO E RODAPÉ (ELEGANTES E DESTACADOS)*/
        /* ========================================== */
        header, footer {
            position: relative;
            z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }

        header { 
            padding: 2.5rem calc(2.5rem + var(--safe-margin)) 4rem calc(2.5rem + var(--safe-margin)); 
            /* Degradê escuro no topo que desvanece, dando destaque perfeito ao texto */
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0) 100%);
        }
        
        footer { 
            padding: 4rem calc(2.5rem + var(--safe-margin)) 2.5rem calc(2.5rem + var(--safe-margin)); 
            /* Degradê escuro no rodapé */
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
        }
        
        /* Tipografia e Cores */
        .texto-branco {
            color: #FFFFFF;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        
        .texto-dourado {
            color: var(--gold-premium);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        header h1 { font-family: var(--font-title); font-size: 3.5rem; font-weight: 800; line-height: 1; letter-spacing: 2px; }
        header p { font-size: 1.5rem; font-weight: 400; text-transform: uppercase; letter-spacing: 4px; }
        
        #relogio-tv { font-size: 3.5rem; font-weight: 300; font-variant-numeric: tabular-nums; }

        .telefone { font-size: 3.5rem; font-weight: 800; line-height: 1; }
        .plantao { font-size: 1.3rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .local-nome { font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; }
        .local-end { font-size: 1.3rem; font-weight: 400; color: #E0E0E0; }

        /* ========================================== */
        /* CONTROLES TÉCNICOS ESCONDIDOS              */
        /* ========================================== */
        #painel-controles { 
            position: fixed; bottom: 30px; right: 30px; z-index: 9999; 
            opacity: 0; transition: opacity 0.4s ease; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); border: 1px solid #333;
        }
        #painel-controles:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="painel-controles" class="p-3 rounded-pill shadow d-flex gap-3">
        <button class="btn btn-outline-light rounded-circle p-3" onclick="girar(-90)" title="Girar para a Esquerda"><i class="bi bi-arrow-counterclockwise fs-3"></i></button>
        <button class="btn btn-outline-light rounded-circle p-3" onclick="girar(90)" title="Girar para a Direita"><i class="bi bi-arrow-clockwise fs-3"></i></button>
        <button class="btn btn-outline-warning rounded-circle p-3" onclick="telaCheia()" title="Tela Cheia"><i class="bi bi-arrows-fullscreen fs-3"></i></button>
    </div>

    <div id="tv-wrapper">
        
        <video id="video-fundo" src="video.mp4" autoplay loop muted playsinline></video>

        <header>
            <div class="d-flex align-items-center">
                <img src="logo.png" alt="BV Planos" class="me-4" style="height: 5.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));">
                <div>
                    <h1 class="m-0 texto-branco">BV PLANOS</h1>
                    <p class="m-0 texto-branco">Assistência Funeral</p>
                </div>
            </div>
            <div class="d-flex align-items-center" style="border-left: 2px solid rgba(212, 175, 55, 0.4); padding-left: 2rem;">
                <i class="bi bi-clock texto-dourado me-3 fs-1"></i>
                <span id="relogio-tv" class="texto-branco">00:00</span>
            </div>
        </header>

        <div style="flex-grow: 1;"></div>

        <footer>
            <div class="d-flex align-items-center">
                <i class="bi bi-whatsapp texto-dourado me-4" style="font-size: 4rem;"></i>
                <div>
                    <div class="plantao texto-dourado">Plantão 24 Horas</div>
                    <div class="telefone texto-branco">
                        (84) 98630-8443
                    </div>
                </div>
            </div>
            <div class="text-end">
                <div class="d-flex align-items-center justify-content-end mb-1">
                    <i class="bi bi-geo-alt-fill texto-dourado me-3 fs-3"></i>
                    <span class="local-nome texto-branco">Memorial São Pedro</span>
                </div>
                <div class="local-end texto-branco">Rua Francisco Bittencourt, 211 - Vila Nova</div>
            </div>
        </footer>
    </div>

    <script>
        // 1. Relógio Otimizado
        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const min = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio-tv').textContent = `${horas}:${min}`;
        }
        setInterval(atualizarRelogio, 1000); 
        atualizarRelogio();

        // 2. Lógica de Rotação Protegida
        let anguloAtual = parseInt(localStorage.getItem('tvAnguloVideo')) || 0;
        const wrapper = document.getElementById('tv-wrapper');

        function aplicarRotacao() {
            let anguloNormalizado = ((anguloAtual % 360) + 360) % 360;
            if (anguloNormalizado === 90 || anguloNormalizado === 270) {
                wrapper.classList.add('vertical');
            } else {
                wrapper.classList.remove('vertical');
            }
            wrapper.style.transform = `translate(-50%, -50%) rotate(${anguloAtual}deg)`;
            localStorage.setItem('tvAnguloVideo', anguloAtual);
        }
        function girar(graus) { 
            anguloAtual += graus; 
            aplicarRotacao(); 
        }
        aplicarRotacao(); 

        // 3. Tela Cheia Automática/Manual
        function telaCheia() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
